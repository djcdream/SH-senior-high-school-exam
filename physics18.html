    <script src="physics-data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chapterId = 'physics18';
            const btn = document.getElementById('complete-btn');
            const currentStatus = PhysicsProgressManager.getChapterStatus(chapterId);
            if (currentStatus === 'unstarted') {
                PhysicsProgressManager.updateStatus(chapterId, 'in-progress');
            } else if (currentStatus === 'completed') {
                btn.textContent = '本章已完成';
                btn.classList.add('completed');
                btn.disabled = true;
            }
            btn.addEventListener('click', () => {
                PhysicsProgressManager.updateStatus(chapterId, 'completed');
                btn.textContent = '本章已完成';
                btn.classList.add('completed');
                btn.disabled = true;
                alert('恭喜！你已完成本章的学习！');
                setTimeout(() => {
                    window.location.href = 'physics.html';
                }, 1000);
            });
        });
    </script>
